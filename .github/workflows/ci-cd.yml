name: CI / CD

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: npx nx affected -t lint
      - run: npx nx affected -t build
      - run: npx nx affected -t test

  deploy:
    name: Deploy to EC2
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      - name: Add EC2 to known_hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/ubuntu/recruitment-portal
            git pull origin main
            yarn install --frozen-lockfile
            yarn nx run backend:build --configuration production
            yarn nx run frontend:build --configuration production
            source /etc/environment
            yarn migration:run
            sudo rm -rf /var/www/frontend
            sudo mkdir -p /var/www/frontend
            sudo cp -r dist/apps/frontend/* /var/www/frontend/
            sudo cp scripts/nginx.conf /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx
            pm2 reload apps/backend/ecosystem.config.cjs --update-env
          EOF
